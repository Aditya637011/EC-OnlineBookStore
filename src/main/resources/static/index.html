<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-BookStore Pro | Premium Shopping</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #10b981;
            --background: #0f172a;
            --surface: #1e293b;
            --surface-light: #334155;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --glass: rgba(30, 41, 59, 0.7);
        }

        [data-theme="light"] {
            --background: #f1f5f9;
            --surface: #ffffff;
            --surface-light: #f8fafc;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: rgba(0, 0, 0, 0.1);
            --glass: rgba(255, 255, 255, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            transition: background 0.3s, color 0.3s;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            min-height: 100vh;
        }

        /* Navigation */
        .nav {
            background: var(--glass);
            backdrop-filter: blur(16px);
            padding: 0.75rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            letter-spacing: -0.5px;
        }

        .nav-actions {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .btn-icon {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid transparent;
            color: var(--text);
            cursor: pointer;
            font-size: 1.1rem;
            position: relative;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-icon:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--primary);
            border-color: var(--border);
            transform: translateY(-2px);
        }

        .badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: var(--primary);
            color: white;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 20px;
            border: 2px solid var(--surface);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        /* Controls Bar */
        .controls {
            padding: 1.5rem 5%;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
        }

        .search-wrap {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        .search-wrap input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.8rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--background);
            color: var(--text);
        }

        .search-wrap i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .filter-select {
            padding: 0.75rem 1rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--background);
            color: var(--text);
            cursor: pointer;
        }

        /* Main Layout */
        .main {
            display: grid;
            grid-template-columns: 240px 1fr;
            gap: 2rem;
            padding: 2rem 5%;
        }

        /* Sidebar */
        .sidebar-section {
            margin-bottom: 2rem;
        }

        .sidebar-title {
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 1rem;
            letter-spacing: 1px;
        }

        .cat-item {
            padding: 0.6rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 0.25rem;
            display: flex;
            justify-content: space-between;
        }

        .cat-item:hover,
        .cat-item.active {
            background: var(--primary);
            color: white;
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--surface);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            position: relative;
            transition: 0.3s transform;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
        }

        .card-img {
            height: 260px;
            width: 100%;
            object-fit: cover;
        }

        .card-body {
            padding: 1.2rem;
        }

        .card-title {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 0.25rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-author {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 0.75rem;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--secondary);
        }

        .wish-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--glass);
            padding: 0.5rem;
            border-radius: 50%;
            color: var(--text);
            border: none;
            cursor: pointer;
            z-index: 10;
        }

        .wish-btn.active {
            color: #f43f5e;
        }

        /* Modals */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 1rem;
        }

        .modal {
            background: var(--surface);
            border-radius: 24px;
            width: 100%;
            max-width: 900px;
            padding: 2rem;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.5rem;
        }

        /* Cart/Order Sidebar */
        .sidebar-modal {
            position: fixed;
            top: 0;
            right: -450px;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: var(--surface);
            z-index: 1500;
            border-left: 1px solid var(--border);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .sidebar-modal.open {
            right: 0;
            box-shadow: -20px 0 50px rgba(0, 0, 0, 0.5);
        }

        .sm-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sm-body {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
        }

        .sm-footer {
            padding: 1.5rem;
            background: var(--surface-light);
            border-top: 1px solid var(--border);
        }

        /* Global Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--primary);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            z-index: 3000;
            transform: translateY(100px);
            opacity: 0;
            transition: 0.3s;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* Buttons generic */
        .btn-box {
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            transition: 0.2s;
        }

        .btn-fill {
            background: var(--primary);
            color: white;
        }

        .btn-fill:hover {
            background: var(--primary-hover);
        }

        .loader {
            text-align: center;
            grid-column: 1/-1;
            padding: 5rem;
            font-size: 3rem;
            color: var(--primary);
        }

        /* Detail Modal Content */
        .detail-row {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 2rem;
        }

        .detail-img {
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .stat-card {
            border: 1px solid var(--border);
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
        }

        /* Order List */
        .order-card {
            background: var(--surface-light);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <nav class="nav">
        <a href="#" class="logo" onclick="location.reload()">
            <i class="fas fa-book-sparkles"></i> Bookstore<span style="color:var(--secondary)">Pro</span>
        </a>
        <div class="nav-actions">
            <!-- Action Icons Group -->
            <div style="display: flex; gap: 0.75rem;">
                <button class="btn-icon" onclick="toggleTheme()" title="Toggle Theme">
                    <i class="fas fa-moon" id="themeIcon"></i>
                </button>
                <button class="btn-icon" onclick="openSidebar('orderHistory')" title="Order History">
                    <i class="fas fa-history"></i>
                </button>
                <button class="btn-icon" onclick="openSidebar('wishlistSidebar')" title="Wishlist">
                    <i class="fas fa-heart"></i>
                    <span class="badge" id="wishBadge">0</span>
                </button>
                <button class="btn-icon" onclick="openSidebar('cartSidebar')" title="Cart">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="badge" id="cartBadge">0</span>
                </button>
            </div>

            <div style="height: 24px; width: 1px; background: var(--border); margin: 0 0.5rem;"></div>

            <!-- Login/Admin Buttons Group -->
            <div style="display: flex; gap: 0.75rem; align-items: center;">
                <a href="/admin.html" class="btn-box"
                    style="background: transparent; border: 1px solid var(--border); text-decoration: none; color: var(--text); font-size: 0.85rem; padding: 0.6rem 1.2rem; width: auto; height: 40px; border-radius: 12px;">
                    <i class="fas fa-lock" style="font-size: 0.8rem; margin-right: 4px;"></i> Admin
                </a>
                <button class="btn-box btn-fill" onclick="openAuth()" id="loginBtn"
                    style="padding: 0.6rem 1.2rem; width: auto; height: 40px; border-radius: 12px; font-size: 0.85rem;">
                    <i class="fas fa-user-circle"></i> Login
                </button>
            </div>
        </div>
    </nav>

    <div class="controls">
        <div class="search-wrap">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search by title, author, or keywords..."
                onkeyup="fetchBooks()">
        </div>
        <select class="filter-select" id="sortBy" onchange="fetchBooks()">
            <option value="">Sort By: Relevance</option>
            <option value="priceAsc">Price: Low to High</option>
            <option value="priceDesc">Price: High to Low</option>
            <option value="ratingDesc">Top Rated</option>
        </select>
        <div style="display:flex; align-items:center; gap:0.5rem; color:var(--text-muted);">
            Price: <input type="number" id="minPrice" placeholder="0" class="filter-select" style="width:80px;"
                onchange="fetchBooks()">
            - <input type="number" id="maxPrice" placeholder="2000" class="filter-select" style="width:100px;"
                onchange="fetchBooks()">
        </div>
    </div>

    <main class="main">
        <aside>
            <div class="sidebar-section">
                <h3 class="sidebar-title">Categories</h3>
                <div id="categoryList">
                    <div class="cat-item active" onclick="setCategory('All', this)">All Books</div>
                    <!-- Categories dynamic -->
                </div>
            </div>
            <div class="sidebar-section">
                <h3 class="sidebar-title">Customer Rating</h3>
                <div class="cat-item" onclick="setRating(4, this)">4.0+ Stars</div>
                <div class="cat-item" onclick="setRating(3, this)">3.0+ Stars</div>
            </div>
        </aside>

        <section>
            <div class="grid" id="booksGrid">
                <div class="loader"><i class="fas fa-spinner fa-spin"></i></div>
            </div>
        </section>
    </main>

    <!-- Sidebars -->
    <!-- Cart -->
    <div class="sidebar-modal" id="cartSidebar">
        <div class="sm-header">
            <h2>Your Cart</h2>
            <i class="fas fa-times close-btn" onclick="closeSidebar('cartSidebar')"></i>
        </div>
        <div class="sm-body" id="cartItems"></div>
        <div class="sm-footer">
            <div style="margin-bottom:1rem; display:flex; gap:0.5rem;">
                <input id="couponCode" placeholder="Promo Code" class="filter-select" style="flex:1;">
                <button class="btn-box btn-fill" style="width:auto;" onclick="applyCoupon()">Apply</button>
            </div>
            <div style="display:flex; justify-content:space-between; margin-bottom:0.5rem;">
                <span>Subtotal</span><span id="subtotal">₹0</span>
            </div>
            <div id="discountRow"
                style="display:none; justify-content:space-between; margin-bottom:0.5rem; color:var(--secondary);">
                <span>Discount</span><span id="discountVal">-₹0</span>
            </div>
            <div
                style="display:flex; justify-content:space-between; font-size:1.5rem; font-weight:800; margin-bottom:1.5rem;">
                <span>Total</span><span id="cartTotal">₹0</span>
            </div>
            <button class="btn-box btn-fill" onclick="goCheckout()">Proceed to Checkout</button>
        </div>
    </div>

    <!-- Wishlist -->
    <div class="sidebar-modal" id="wishlistSidebar">
        <div class="sm-header">
            <h2>Wishlist</h2>
            <i class="fas fa-times close-btn" onclick="closeSidebar('wishlistSidebar')"></i>
        </div>
        <div class="sm-body" id="wishlistItems"></div>
    </div>

    <!-- Order History -->
    <div class="sidebar-modal" id="orderHistory">
        <div class="sm-header">
            <h2>Order History</h2>
            <i class="fas fa-times close-btn" onclick="closeSidebar('orderHistory')"></i>
        </div>
        <div class="sm-body" id="orderList"></div>
    </div>

    <!-- Checkout Modal -->
    <div class="modal-overlay" id="checkoutModal">
        <div class="modal" style="max-width:500px;">
            <i class="fas fa-times close-btn" onclick="closeModal('checkoutModal')"></i>
            <h2>Final Step</h2>
            <div style="margin:1.5rem 0;">
                <label class="sidebar-title">Delivery Address</label>
                <textarea id="addressInput" class="filter-select" style="width:100%; height:100px; margin-top:0.5rem;"
                    placeholder="123 Street, City, Country..."></textarea>
            </div>
            <div style="margin-bottom:1.5rem;">
                <label class="sidebar-title">Payment</label>
                <div style="display:flex; gap:1rem; margin-top:0.5rem;">
                    <button class="btn-box" id="payCOD" onclick="setPayM('COD')">COD</button>
                    <button class="btn-box" id="payUPI" onclick="setPayM('UPI')">UPI</button>
                </div>
            </div>
            <button class="btn-box btn-fill" onclick="submitOrder()">Place Order (₹<span
                    id="checkTotal">0</span>)</button>
        </div>
    </div>

    <!-- Detail Modal -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal">
            <i class="fas fa-times close-btn" onclick="closeModal('detailModal')"></i>
            <div id="detailContent"></div>
        </div>
    </div>

    <!-- Auth -->
    <div class="modal-overlay" id="authModal">
        <div class="modal" style="max-width:400px; text-align:center;">
            <i class="fas fa-times close-btn" onclick="closeModal('authModal')"></i>
            <i class="fas fa-user-circle" style="font-size:3rem; color:var(--primary); margin-bottom:1rem;"></i>
            <h3>Account Login</h3>
            <div style="margin:1.5rem 0;">
                <input type="text" id="usernameInput" class="filter-select" style="width:100%; margin-bottom:1rem;"
                    placeholder="Your Name">
                <input type="password" class="filter-select" style="width:100%;" placeholder="Password">
            </div>
            <button class="btn-box btn-fill" onclick="doLogin()">Login</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let state = {
            user: { id: 1, name: "Guest" },
            books: [],
            cart: [],
            wishlist: [],
            orders: [],
            filters: { category: 'All', rating: 0 },
            discount: 0,
            paymentMethod: 'COD'
        };

        // Init
        document.addEventListener("DOMContentLoaded", () => {
            if (localStorage.getItem('theme') === 'light') toggleTheme();
            fetchBooks();
            fetchWishlist();
            refreshCart();
            fetchOrders();
        });

        const notify = (msg) => {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        };

        const toggleTheme = () => {
            const body = document.body;
            const icon = document.getElementById('themeIcon');
            const isLight = body.getAttribute('data-theme') === 'light';
            body.setAttribute('data-theme', isLight ? 'dark' : 'light');
            icon.className = isLight ? 'fas fa-moon' : 'fas fa-sun';
            localStorage.setItem('theme', isLight ? 'dark' : 'light');
        };

        // API Calls
        async function fetchBooks() {
            const params = new URLSearchParams({
                search: document.getElementById('searchInput').value,
                sortBy: document.getElementById('sortBy').value,
                minPrice: document.getElementById('minPrice').value,
                maxPrice: document.getElementById('maxPrice').value,
                category: state.filters.category,
                minRating: state.filters.rating
            });
            const res = await fetch(`/api/books?${params}`);
            state.books = await res.json();
            renderBooks();
            renderCategories();
        }

        async function refreshCart() {
            const res = await fetch(`/api/cart/${state.user.id}`);
            state.cart = await res.json();
            document.getElementById('cartBadge').textContent = state.cart.length;
            renderCart();
        }

        async function fetchWishlist() {
            const res = await fetch(`/api/wishlist/${state.user.id}`);
            state.wishlist = await res.json();
            document.getElementById('wishBadge').textContent = state.wishlist.length;
            renderBooks(); // Update heart icons
        }

        async function fetchOrders() {
            const res = await fetch(`/api/orders/user/${state.user.id}`);
            state.orders = await res.json();
            renderOrders();
        }

        // Renderers
        function renderBooks() {
            const grid = document.getElementById('booksGrid');
            grid.innerHTML = state.books.map(b => {
                const isWish = state.wishlist.some(w => w.book.id === b.id);
                return `
                <div class="card" onclick="openDetail(${b.id})">
                    <button class="wish-btn ${isWish ? 'active' : ''}" onclick="event.stopPropagation(); toggleWish(${b.id})">
                        <i class="fas fa-heart"></i>
                    </button>
                    <img src="${b.coverImageUrl}" class="card-img" alt="cover">
                    <div class="card-body">
                        <div class="card-title">${b.title}</div>
                        <div class="card-author">${b.author}</div>
                        <div class="card-footer">
                            <span class="price">₹${b.price.toFixed(0)}</span>
                            <div style="font-size:0.8rem; color:#fbbf24;"><i class="fas fa-star"></i> ${b.rating.toFixed(1)}</div>
                        </div>
                    </div>
                </div>`;
            }).join('') || '<div style="grid-column:1/-1; text-align:center;">No books found matching criteria.</div>';
        }

        function renderCategories() {
            const container = document.getElementById('categoryList');
            const cats = ['All', ...new Set(state.books.map(b => b.category))].filter(Boolean);
            container.innerHTML = cats.map(c => `
                <div class="cat-item ${state.filters.category === c ? 'active' : ''}" onclick="setCategory('${c}', this)">
                    ${c}
                </div>
            `).join('');
        }

        function renderCart() {
            const container = document.getElementById('cartItems');
            let subtotal = 0;
            container.innerHTML = state.cart.map(i => {
                subtotal += i.book.price * i.quantity;
                return `
                <div style="display:flex; gap:1rem; margin-bottom:1rem; align-items:center;">
                    <img src="${i.book.coverImageUrl}" style="width:50px; border-radius:4px;">
                    <div style="flex:1;">
                        <div style="font-weight:700;">${i.book.title}</div>
                        <div style="color:var(--text-muted); font-size:0.8rem;">₹${i.book.price} x ${i.quantity}</div>
                    </div>
                    <button class="btn-icon" style="color:#ef4444;" onclick="removeFromCart(${i.id})"><i class="fas fa-trash"></i></button>
                </div>`;
            }).join('') || 'Cart is empty';

            document.getElementById('subtotal').textContent = '₹' + subtotal.toFixed(0);
            const disc = (subtotal * state.discount) / 100;
            const final = subtotal - disc;

            if (disc > 0) {
                document.getElementById('discountRow').style.display = 'flex';
                document.getElementById('discountVal').textContent = '-₹' + disc.toFixed(0);
            } else document.getElementById('discountRow').style.display = 'none';

            document.getElementById('cartTotal').textContent = '₹' + final.toFixed(0);
            document.getElementById('checkTotal').textContent = final.toFixed(0);
        }

        // Logic
        function setCategory(cat, el) { state.filters.category = cat; fetchBooks(); }
        function setRating(r, el) { state.filters.rating = r; fetchBooks(); }

        async function toggleWish(id) {
            const existing = state.wishlist.find(w => w.book.id === id);
            if (existing) {
                await fetch(`/api/wishlist/${existing.id}`, { method: 'DELETE' });
                notify("Removed from Wishlist");
            } else {
                await fetch('/api/wishlist', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: state.user.id, book: { id } })
                });
                notify("Added to Wishlist");
            }
            fetchWishlist();
        }

        async function addToCart(id) {
            await fetch('/api/cart', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: state.user.id, book: { id }, quantity: 1 })
            });
            notify("Added to Cart");
            refreshCart();
        }

        async function removeFromCart(id) {
            await fetch(`/api/cart/${id}`, { method: 'DELETE' });
            refreshCart();
        }

        async function applyCoupon() {
            const code = document.getElementById('couponCode').value;
            const res = await fetch(`/api/coupons/validate/${code}`);
            const coupon = await res.json().catch(() => null);
            if (coupon) {
                state.discount = coupon.discountPercentage;
                notify(`Applied ${coupon.discountPercentage}% Discount!`);
                renderCart();
            } else {
                state.discount = 0;
                notify("Invalid Coupon Code");
                renderCart();
            }
        }

        async function openDetail(id) {
            const b = state.books.find(x => x.id === id);
            document.getElementById('detailContent').innerHTML = `
                <div class="detail-row">
                    <img src="${b.coverImageUrl}" class="detail-img">
                    <div>
                        <h1 style="font-size:2.5rem; line-height:1.1;">${b.title}</h1>
                        <p style="font-size:1.2rem; color:var(--text-muted); margin-top:0.5rem;">by ${b.author}</p>
                        <div class="stats-grid">
                            <div class="stat-card"><b>Published</b><br>${b.publishedDate}</div>
                            <div class="stat-card"><b>Sales</b><br>${b.worldwideSales}</div>
                            <div class="stat-card"><b>Rating</b><br>${b.rating.toFixed(1)}/5</div>
                        </div>
                        <p style="line-height:1.7; color:var(--text-muted); margin-bottom:2rem;">${b.description}</p>
                        <div style="display:flex; gap:1rem;">
                            <button class="btn-box btn-fill" onclick="addToCart(${b.id})"><i class="fas fa-cart-plus"></i> Buy for ₹${b.price}</button>
                            <button class="btn-box" style="background:var(--surface-light); border:1px solid var(--border)" onclick="toggleWish(${b.id})"><i class="fas fa-heart"></i> Save</button>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('detailModal').style.display = 'flex';
        }

        // Checkout Logic
        function setPayM(m) {
            state.paymentMethod = m;
            document.getElementById('payCOD').style.border = m === 'COD' ? '2px solid var(--primary)' : 'none';
            document.getElementById('payUPI').style.border = m === 'UPI' ? '2px solid var(--primary)' : 'none';
        }

        async function submitOrder() {
            const addr = document.getElementById('addressInput').value;
            if (!addr) return notify("Please enter address!");

            const total = parseFloat(document.getElementById('checkTotal').textContent);
            const items = state.cart.map(c => ({ book: { id: c.book.id }, quantity: c.quantity, priceAtOrder: c.book.price }));

            const res = await fetch('/api/orders', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userId: state.user.id,
                    totalAmount: total,
                    shippingAddress: addr,
                    paymentMethod: state.paymentMethod,
                    items: items
                })
            });

            const order = await res.json();
            notify("Order Placed Successfully!");

            // Clear cart
            await fetch(`/api/cart/user/${state.user.id}`, { method: 'DELETE' });
            refreshCart();
            closeModal('checkoutModal');
            closeSidebar('cartSidebar');
            fetchOrders();
        }

        function renderOrders() {
            const grid = document.getElementById('orderList');
            grid.innerHTML = state.orders.map(o => `
                <div class="order-card">
                    <div class="order-header">
                        <span>ID: #${o.id}</span>
                        <span>${new Date(o.orderDate).toLocaleDateString()}</span>
                    </div>
                    <div style="font-weight:700; color:var(--secondary);">₹${o.totalAmount} - ${o.orderStatus}</div>
                    <div style="font-size:0.8rem; color:var(--text-muted); margin-top:0.5rem;">${o.shippingAddress}</div>
                </div>
            `).join('') || "No orders yet.";
        }

        // Helpers
        function openSidebar(id) { document.getElementById(id).classList.add('open'); }
        function closeSidebar(id) { document.getElementById(id).classList.remove('open'); }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function openAuth() { openModal('authModal'); }
        function doLogin() {
            state.user.name = document.getElementById('usernameInput').value || "User";
            document.getElementById('loginBtn').textContent = "Hi, " + state.user.name;
            closeModal('authModal');
            notify("Welcome, " + state.user.name);
        }
        function goCheckout() {
            if (state.cart.length === 0) return notify("Cart is empty");
            openModal('checkoutModal');
        }
    </script>
</body>

</html>
