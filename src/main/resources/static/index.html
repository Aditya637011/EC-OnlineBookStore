<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Grand Online Bookstore</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --secondary: #10B981;
            --background: #0f172a;
            --surface: #1e293b;
            --surface-glass: rgba(30, 41, 59, 0.85);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Navbar */
        .navbar {
            background: var(--surface-glass);
            backdrop-filter: blur(12px);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo i {
            color: var(--primary);
        }

        .search-bar {
            flex: 1;
            max-width: 500px;
            margin: 0 2rem;
            position: relative;
        }

        .search-bar input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
        }

        .search-bar i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: 0.3s;
        }

        .nav-btn:hover {
            color: #fff;
        }

        .cart-count {
            background: var(--primary);
            color: #fff;
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 10px;
        }

        /* Main Container */
        .main-layout {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 5%;
            gap: 2rem;
        }

        /* Sidebar Filters */
        .sidebar {
            width: 250px;
            flex-shrink: 0;
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .sidebar h3 {
            margin-bottom: 1rem;
            font-size: 1.2rem;
            color: #fff;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .category-list {
            list-style: none;
        }

        .category-item {
            padding: 0.75rem 0;
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .category-item:hover,
        .category-item.active {
            color: var(--primary);
            font-weight: 600;
        }

        /* Books Container */
        .content {
            flex: 1;
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.5rem;
        }

        /* Book Card */
        .book-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            position: relative;
        }

        .book-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            border-color: var(--primary);
        }

        .book-cover {
            height: 300px;
            width: 100%;
            object-fit: cover;
        }

        .book-info {
            padding: 1rem;
        }

        .book-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.2rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .book-author {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .book-rating {
            color: #fbbf24;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }

        .book-price {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 1rem;
        }

        .card-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn {
            padding: 0.6rem 1rem;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        .btn-outline:hover {
            background: rgba(79, 70, 229, 0.1);
        }

        /* Modals Generic */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            padding: 2rem;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal.large-modal {
            max-width: 800px;
        }

        .close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-muted);
        }

        /* Book Detail Modal */
        #detailModal .modal-content {
            display: flex;
            gap: 2rem;
        }

        .detail-cover {
            width: 250px;
            height: 350px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .detail-info {
            flex: 1;
        }

        .detail-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.5rem;
        }

        .detail-author {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .detail-stats {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            color: #cbd5e1;
        }

        .detail-stats div {
            background: rgba(0, 0, 0, 0.2);
            padding: 0.5rem;
            border-radius: 4px;
        }

        .reviews-section {
            margin-top: 2rem;
            border-top: 1px solid var(--border);
            padding-top: 1rem;
        }

        .review-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .review-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1rem;
        }

        .review-form textarea {
            width: 100%;
            height: 80px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: #fff;
            padding: 0.5rem;
            resize: none;
        }

        .star-input {
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .star-input.active {
            color: #fbbf24;
        }

        /* Cart Sidebar */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -450px;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: var(--surface);
            z-index: 1100;
            border-left: 1px solid var(--border);
            transition: 0.4s ease;
            display: flex;
            flex-direction: column;
        }

        .cart-sidebar.open {
            right: 0;
            box-shadow: -20px 0 50px rgba(0, 0, 0, 0.5);
        }

        .cart-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .cart-item {
            display: flex;
            gap: 1rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
            align-items: center;
        }

        .cart-item img {
            width: 60px;
            height: 80px;
            object-fit: cover;
            border-radius: 4px;
        }

        .cart-footer {
            padding: 1.5rem;
            border-top: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.2);
        }

        /* Payment Form */
        #paymentForm {
            display: none;
            margin-top: 1rem;
            background: rgba(0, 0, 0, 0.2);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .radio-group {
            display: flex;
            gap: 1rem;
            margin: 1rem 0;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        #addressSection.hidden {
            display: none;
        }

        #qrCodeSection.hidden {
            display: none;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--secondary);
            color: white;
            padding: 1rem 2rem;
            border-radius: 8px;
            opacity: 0;
            transform: translateY(20px);
            transition: 0.3s;
            z-index: 2000;
            font-weight: 600;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .loader {
            text-align: center;
            padding: 3rem;
            font-size: 2rem;
            color: var(--primary);
            width: 100%;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <a href="#" class="logo" onclick="fetchAllBooks()">
            <i class="fas fa-book-open"></i> E-BookStore
        </a>
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search title or author..." onkeyup="handleSearch()">
        </div>
        <div class="nav-links">
            <button class="nav-btn" onclick="openLoginCard()" id="accountBtn">
                <i class="fas fa-user"></i> <span id="accountText">Register / Login</span>
            </button>
            <button class="nav-btn" onclick="toggleCart()">
                <i class="fas fa-shopping-cart"></i> Cart
                <span class="cart-count" id="cartCount">0</span>
            </button>
        </div>
    </nav>

    <div class="main-layout">
        <aside class="sidebar">
            <h3>Book Types</h3>
            <ul class="category-list" id="categoryList">
                <li class="category-item active" onclick="filterByCategory('All')">All Books <span id="allCount"></span>
                </li>
            </ul>
        </aside>

        <main class="content">
            <div id="loader" class="loader"><i class="fas fa-circle-notch fa-spin"></i> Loading...</div>
            <div class="books-grid" id="booksGrid" style="display: none;"></div>
        </main>
    </div>

    <!-- Modals -->
    <!-- Detail Modal -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal large-modal">
            <i class="fas fa-times close-btn" onclick="closeModal('detailModal')"></i>
            <div class="modal-content">
                <img id="dCover" class="detail-cover" src="">
                <div class="detail-info">
                    <h2 id="dTitle" class="detail-title"></h2>
                    <p id="dAuthor" class="detail-author"></p>
                    <h3 id="dPrice" class="book-price"></h3>
                    <div class="detail-stats">
                        <div><i class="fas fa-calendar-alt"></i> Pub: <span id="dDate"></span></div>
                        <div><i class="fas fa-globe"></i> Sales: <span id="dSales"></span></div>
                        <div><i class="fas fa-star" style="color:#fbbf24;"></i> <span id="dRating"></span>/5.0</div>
                    </div>
                    <p id="dDesc" style="color:var(--text-muted); line-height:1.6;"></p>

                    <div style="display:flex; gap:1rem; margin-top:1.5rem;">
                        <button class="btn btn-primary" id="dBuyBtn"><i class="fas fa-cart-plus"></i> Add to
                            Cart</button>
                        <button class="btn btn-outline" id="dReadBtn"><i class="fas fa-book-reader"></i> Read
                            Online</button>
                    </div>

                    <div class="reviews-section">
                        <h3><i class="fas fa-comments"></i> Ratings & Comments</h3>
                        <div id="reviewsList"
                            style="margin-top:1rem; max-height:200px; overflow-y:auto; padding-right:0.5rem;"></div>

                        <div class="review-form">
                            <div id="starContainer">
                                <i class="fas fa-star star-input" data-val="1"></i>
                                <i class="fas fa-star star-input" data-val="2"></i>
                                <i class="fas fa-star star-input" data-val="3"></i>
                                <i class="fas fa-star star-input" data-val="4"></i>
                                <i class="fas fa-star star-input" data-val="5"></i>
                            </div>
                            <textarea id="reviewComment" placeholder="Leave your comment..."></textarea>
                            <button class="btn btn-secondary" onclick="submitReview()"
                                style="background:var(--secondary); color:#fff; border:none; padding:0.5rem; border-radius:4px; font-weight:600; cursor:pointer;">Post
                                Review</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Reader Modal -->
    <div class="modal-overlay" id="readerModal">
        <div class="modal large-modal" style="height:90vh; display:flex; flex-direction:column;">
            <i class="fas fa-times close-btn" onclick="closeModal('readerModal')"></i>
            <h2 id="rTitle" style="padding-bottom:1rem; border-bottom:1px solid var(--border);"></h2>
            <div id="rContent"
                style="flex:1; overflow-y:auto; padding:2rem 1rem; font-family:Georgia,serif; font-size:1.1rem; line-height:1.8; white-space:pre-wrap;">
            </div>
        </div>
    </div>

    <!-- Login/Register Modal -->
    <div class="modal-overlay" id="authModal">
        <div class="modal">
            <i class="fas fa-times close-btn" onclick="closeModal('authModal')"></i>
            <h2>Register/Login</h2>
            <form onsubmit="handleAuth(event)" style="margin-top:1rem;">
                <input type="text" id="regFirst" placeholder="Name" class="form-control" style="margin-bottom:1rem;"
                    required>
                <input type="email" placeholder="Email" class="form-control" style="margin-bottom:1rem;" required>
                <input type="password" placeholder="Password" class="form-control" style="margin-bottom:1rem;" required>
                <button type="submit" class="btn btn-primary" style="width:100%;">Submit</button>
            </form>
        </div>
    </div>

    <!-- Receipt Modal -->
    <div class="modal-overlay" id="receiptModal">
        <div class="modal" style="text-align: center;">
            <i class="fas fa-check-circle" style="font-size:4rem; color:var(--secondary); margin-bottom:1rem;"></i>
            <h2 style="margin-bottom:0.5rem;">Order Placed Successfully!</h2>
            <p id="receiptDetails" style="color:var(--text-muted); line-height:1.6;"></p>
            <button class="btn btn-primary" style="margin-top:2rem; width:100%;"
                onclick="closeModal('receiptModal')">Continue Shopping</button>
        </div>
    </div>

    <!-- Cart Sidebar -->
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h2>Your Cart</h2>
            <i class="fas fa-times close-btn" style="position:static;" onclick="toggleCart()"></i>
        </div>
        <div class="cart-items" id="cartItemsContainer"></div>
        <div class="cart-footer">
            <div
                style="display:flex; justify-content:space-between; font-size:1.25rem; font-weight:700; margin-bottom:1rem;">
                <span>Total:</span><span id="cartTotalValue">₹0.00</span>
            </div>

            <button class="btn btn-primary" onclick="showPaymentForm()" style="width:100%;" id="checkoutBtn">Proceed to
                Checkout</button>

            <div id="paymentForm">
                <h4 style="margin-bottom:0.5rem; color:#fff;">Delivery Method</h4>
                <div class="radio-group">
                    <label><input type="radio" name="delivery" value="pickup" checked onchange="toggleDelivery()"> Store
                        Pickup</label>
                    <label><input type="radio" name="delivery" value="home" onchange="toggleDelivery()"> Home
                        Delivery</label>
                </div>

                <div id="addressSection" class="hidden">
                    <textarea class="form-control" id="deliveryAddress"
                        placeholder="Enter full delivery address..."></textarea>
                </div>

                <h4 style="margin-top:1rem; margin-bottom:0.5rem; color:#fff;">Payment Method</h4>
                <div class="radio-group">
                    <label><input type="radio" name="payment" value="cod" checked onchange="togglePayment()"> Cash on
                        Delivery</label>
                    <label><input type="radio" name="payment" value="upi" onchange="togglePayment()"> UPI</label>
                </div>

                <div id="qrCodeSection" class="hidden"
                    style="text-align:center; margin:1rem 0; background:#fff; padding:1rem; border-radius:8px;">
                    <img id="qrImage" src="" alt="UPI QR Code" style="width:150px; height:150px; border-radius:4px;">
                    <p style="color:#000; font-weight:600; margin-top:0.5rem; font-size:0.9rem;">Scan to pay <span
                            id="qrAmount"></span></p>
                </div>

                <button class="btn btn-success" style="width:100%; margin-top:1rem;" onclick="placeOrder()">Place
                    Order</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">Message</div>

    <script>
        let allBooks = [];
        let categories = [];
        let cart = [];
        let mockUserId = 1;
        let currentDetailBookId = null;
        let selectedStar = 0;
        let finalCartTotal = 0;
        let currentUser = "BookstoreUser";

        // Init
        document.addEventListener("DOMContentLoaded", () => {
            fetchBooks();
            fetchCart();
            setupStars();
        });

        const showToast = (msg) => {
            const el = document.getElementById('toast');
            el.textContent = msg; el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 3000);
        };
        const closeModal = (id) => { document.getElementById(id).style.display = 'none'; document.body.style.overflow = 'auto'; };

        async function fetchBooks() {
            try {
                const res = await fetch('/api/books');
                allBooks = await res.json();
                extractCategories();
                renderBooks(allBooks);
                document.getElementById('loader').style.display = 'none';
                document.getElementById('booksGrid').style.display = 'grid';
            } catch (err) { showToast("Error loading books."); }
        }

        function extractCategories() {
            const list = document.getElementById('categoryList');
            document.getElementById('allCount').textContent = `(${allBooks.length})`;
            const cats = [...new Set(allBooks.map(b => b.category))].sort();
            cats.forEach(c => {
                if (!c) return;
                const count = allBooks.filter(b => b.category === c).length;
                list.innerHTML += `<li class="category-item" onclick="filterByCategory('${c}', this)">${c} <span>(${count})</span></li>`;
            });
        }

        function filterByCategory(cat, el) {
            document.querySelectorAll('.category-item').forEach(e => e.classList.remove('active'));
            if (el) el.classList.add('active');
            else document.querySelector('.category-item').classList.add('active');

            if (cat === 'All') renderBooks(allBooks);
            else renderBooks(allBooks.filter(b => b.category === cat));
        }

        function handleSearch() {
            const t = document.getElementById('searchInput').value.toLowerCase();
            renderBooks(allBooks.filter(b => b.title.toLowerCase().includes(t) || b.author.toLowerCase().includes(t)));
        }

        function renderBooks(books) {
            const grid = document.getElementById('booksGrid');
            grid.innerHTML = '';
            books.forEach(b => {
                grid.innerHTML += `
                    <div class="book-card" onclick="openDetail(${b.id})">
                        <img src="${b.coverImageUrl}" alt="Cover" class="book-cover">
                        <div class="book-info">
                            <div class="book-title">${b.title}</div>
                            <div class="book-author">By ${b.author}</div>
                            <div class="book-rating"><i class="fas fa-star"></i> ${(b.rating).toFixed(1)}</div>
                            <div class="book-price">₹${b.price.toFixed(2)}</div>
                            <div class="card-actions">
                                <button class="btn btn-primary" onclick="event.stopPropagation(); addToCart(null, ${b.id})">Buy</button>
                                <button class="btn btn-outline" onclick="event.stopPropagation(); openReader(${b.id})">Read</button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        async function openDetail(id) {
            const b = allBooks.find(x => x.id === id);
            currentDetailBookId = id;
            document.getElementById('dCover').src = b.coverImageUrl;
            document.getElementById('dTitle').textContent = b.title;
            document.getElementById('dAuthor').textContent = "By " + b.author;
            document.getElementById('dPrice').textContent = "₹" + b.price.toFixed(2);
            document.getElementById('dDate').textContent = b.publishedDate;
            document.getElementById('dSales').textContent = b.worldwideSales;
            document.getElementById('dRating').textContent = b.rating.toFixed(1);
            document.getElementById('dDesc').textContent = b.description;

            document.getElementById('dBuyBtn').onclick = () => addToCart(null, b.id);
            document.getElementById('dReadBtn').onclick = () => { closeModal('detailModal'); openReader(b.id); };

            await fetchReviews(id);
            document.getElementById('detailModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';

            // clear review form
            document.getElementById('reviewComment').value = '';
            selectedStar = 0; updateStarsUI();
        }

        async function fetchReviews(bookId) {
            const container = document.getElementById('reviewsList');
            container.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading reviews...';
            try {
                const res = await fetch(`/api/reviews/${bookId}`);
                const data = await res.json();
                if (data.length === 0) container.innerHTML = '<p style="color:var(--text-muted)">No reviews yet. Be the first!</p>';
                else {
                    container.innerHTML = '';
                    data.reverse().forEach(r => {
                        let stars = '';
                        for (let i = 1; i <= 5; i++) stars += `<i class="fas fa-star" style="color:${i <= r.rating ? '#fbbf24' : '#475569'};"></i>`;
                        container.innerHTML += `
                            <div class="review-card">
                                <div style="display:flex; justify-content:space-between; font-weight:600; font-size:0.9rem; margin-bottom:0.5rem; color:#fff;">
                                    <span>${r.username}</span> <span>${stars}</span>
                                </div>
                                <p style="color:var(--text-muted); font-size:0.9rem;">${r.comment}</p>
                            </div>`;
                    });
                }
            } catch (e) { container.innerHTML = ''; }
        }

        function setupStars() {
            document.querySelectorAll('.star-input').forEach(star => {
                star.onclick = (e) => {
                    selectedStar = parseInt(e.target.dataset.val);
                    updateStarsUI();
                };
            });
        }
        function updateStarsUI() {
            document.querySelectorAll('.star-input').forEach(s => {
                s.classList.remove('active');
                if (parseInt(s.dataset.val) <= selectedStar) s.classList.add('active');
            });
        }

        async function submitReview() {
            if (selectedStar === 0) return showToast("Please select a star rating!");
            const comment = document.getElementById('reviewComment').value.trim();
            try {
                await fetch('/api/reviews', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ bookId: currentDetailBookId, username: currentUser, rating: selectedStar, comment: comment })
                });
                showToast("Review posted!");
                fetchReviews(currentDetailBookId);
                fetchBooks(); // to update global ratings
                document.getElementById('reviewComment').value = '';
                selectedStar = 0; updateStarsUI();
            } catch (e) { showToast("Failed to post review."); }
        }

        function openReader(id) {
            const b = allBooks.find(x => x.id === id);
            document.getElementById('rTitle').textContent = b.title;
            document.getElementById('rContent').textContent = b.content;
            document.getElementById('readerModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        // Cart
        async function fetchCart() {
            try {
                const res = await fetch(`/api/cart/${mockUserId}`);
                cart = await res.json();
                updateCartUI();
            } catch (e) { }
        }
        async function addToCart(btn, id) {
            try {
                await fetch('/api/cart', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: mockUserId, book: { id: id }, quantity: 1 })
                });
                if (btn) { const o = btn.innerHTML; btn.innerHTML = 'Added!'; setTimeout(() => btn.innerHTML = o, 1000); }
                fetchCart(); showToast("Added to Cart");
            } catch (e) { showToast("Error adding to cart."); }
        }
        async function removeFromCart(id) { await fetch(`/api/cart/${id}`, { method: 'DELETE' }); fetchCart(); }

        function toggleCart() { document.getElementById('cartSidebar').classList.toggle('open'); }

        function updateCartUI() {
            document.getElementById('cartCount').textContent = cart.reduce((s, i) => s + i.quantity, 0);
            const container = document.getElementById('cartItemsContainer');
            if (cart.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:var(--text-muted);">Cart is empty.</p>';
                document.getElementById('cartTotalValue').textContent = "₹0.00";
                finalCartTotal = 0;
                document.getElementById('paymentForm').style.display = 'none';
                document.getElementById('checkoutBtn').style.display = 'block';
                return;
            }
            container.innerHTML = '';
            finalCartTotal = 0;
            cart.forEach(item => {
                if (!item.book) return;
                const tot = item.book.price * item.quantity;
                finalCartTotal += tot;
                container.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.book.coverImageUrl}">
                        <div style="flex:1;">
                            <div style="font-weight:600; font-size:0.9rem;">${item.book.title}</div>
                            <div style="color:var(--secondary); font-weight:bold;">₹${item.book.price.toFixed(2)} x ${item.quantity}</div>
                            <button onclick="removeFromCart(${item.id})" style="background:none;border:none;color:#ef4444;font-size:0.8rem;cursor:pointer;margin-top:0.3rem;"><i class="fas fa-trash"></i> Remove</button>
                        </div>
                    </div>`;
            });
            document.getElementById('cartTotalValue').textContent = "₹" + finalCartTotal.toFixed(2);
        }

        function showPaymentForm() {
            if (cart.length === 0) return showToast("Cart is empty!");
            document.getElementById('checkoutBtn').style.display = 'none';
            document.getElementById('paymentForm').style.display = 'block';
            togglePayment(); // init qr
        }

        function toggleDelivery() {
            const v = document.querySelector('input[name="delivery"]:checked').value;
            document.getElementById('addressSection').classList.toggle('hidden', v !== 'home');
        }

        function togglePayment() {
            const p = document.querySelector('input[name="payment"]:checked').value;
            const qS = document.getElementById('qrCodeSection');
            if (p === 'upi') {
                qS.classList.remove('hidden');
                document.getElementById('qrAmount').textContent = "₹" + finalCartTotal.toFixed(2);
                document.getElementById('qrImage').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay?pa=demo@ybl&pn=Bookstore&cu=INR&am=${finalCartTotal.toFixed(2)}`;
            } else { qS.classList.add('hidden'); }
        }

        async function placeOrder() {
            const del = document.querySelector('input[name="delivery"]:checked').value;
            const pay = document.querySelector('input[name="payment"]:checked').value;
            const add = document.getElementById('deliveryAddress').value.trim();

            if (del === 'home' && !add) return showToast("Please enter a valid delivery address!");

            const receiptStr = `
                <b>Total Amount:</b> ₹${finalCartTotal.toFixed(2)}<br>
                <b>Delivery Method:</b> ${del === 'home' ? 'Home Delivery to<br>' + add : 'Store Pickup'}<br>
                <b>Payment Method:</b> ${pay === 'upi' ? 'UPI' : 'Cash on Delivery'}
            `;

            await fetch(`/api/cart/user/${mockUserId}`, { method: 'DELETE' }); // empty cart
            fetchCart();
            toggleCart();

            document.getElementById('receiptDetails').innerHTML = receiptStr;
            document.getElementById('receiptModal').style.display = 'flex';
        }

        function openLoginCard() { document.getElementById('authModal').style.display = 'flex'; }
        async function handleAuth(e) {
            e.preventDefault();
            currentUser = document.getElementById('regFirst').value;
            document.getElementById('accountText').textContent = "Hi, " + currentUser;
            closeModal('authModal');
            showToast("Logged in successfully!");
        }
    </script>
</body>

</html>
